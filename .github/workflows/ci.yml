name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (black)
        run: black --check src tests

      - name: Byte-compile
        run: python -m py_compile $(git ls-files 'src/**/*.py' 'tests/**/*.py')

      - name: Tests + coverage (gate >= 90%)
        run: pytest

      - name: Smoke run (experiment end-to-end)
        run: python run_experiment.py --config configs/experiment.yaml --out reports
